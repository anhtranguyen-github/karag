# SonarQube Project Configuration
sonar.projectKey=karag
sonar.projectName=Karag
sonar.projectVersion=2.0.0

# Path to source and test directories
sonar.sources=src/backend/app,src/frontend/src
sonar.tests=tests,src/frontend/tests

# Inclusion and exclusion patterns
sonar.inclusions=src/backend/app/**/*.py,src/frontend/src/**/*.{ts,tsx,js,jsx}
sonar.exclusions=**/__pycache__/**, **/.venv/**, **/node_modules/**, **/.next/**, **/build/**, **/.coverage/**

# Python specific configuration
sonar.python.version=3.11
sonar.python.xunit.reportPath=src/backend/results-unit.xml
sonar.python.coverage.reportPaths=coverage.xml

# Javascript/Typescript configuration
sonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
