# SonarQube Project Configuration
sonar.projectKey=karag
sonar.projectName=Karag
sonar.projectVersion=2.0.0

# Path to source and test directories
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/tests

# Inclusion and exclusion patterns
sonar.inclusions=backend/app/**/*.py,frontend/src/**/*.{ts,tsx,js,jsx}
sonar.exclusions=**/__pycache__/**, **/.venv/**, **/node_modules/**, **/.next/**, **/build/**, **/.coverage/**

# Python specific configuration
sonar.python.version=3.10
sonar.python.xunit.reportPath=backend/tests/results/results*.xml
sonar.python.coverage.reportPaths=backend/tests/results/coverage.xml

# Javascript/Typescript configuration
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
