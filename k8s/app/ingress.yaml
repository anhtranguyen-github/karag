apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scienchan-app-ingress
  namespace: scienchan-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    
    # --- TLS Termination ---
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # --- LLM Streaming Support ---
    # Disable buffering to allow real-time token streaming from LLM
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    
    # --- Rate Limiting (Abuse Protection) ---
    # Limit to 5 requests per second per IP with a burst of 10
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    
    # --- Observability (OpenTelemetry) ---
    nginx.ingress.kubernetes.io/enable-opentelemetry: "true"
spec:
  # TLS certificate secret (Assumes cert-manager or manual secret)
  tls:
  - hosts:
    - scienchan.example.com
    secretName: scienchan-tls-secret
  rules:
  - host: scienchan.example.com
    http:
      paths:
      # /api/* routes to the backend service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
              
      # / (root) routes to the frontend service
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
