name: DevSecOps Pipeline
# Conceptual Model: Correctness -> Behavior -> Security/Trust/IaC

on:
  push:
    branches: [ main, dev, 'Sc-dev/**' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # --- Stage 1: Question 1: Can this code actually run? ---
  correctness:
    name: "Q1: Code Correctness (Build & Lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Backend Tooling (uv)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Backend Sync & Lint
        working-directory: ./backend
        run: |
          uv sync
          uvx ruff check .
          uvx ruff format --check .

      - name: Setup Frontend Tooling (pnpm)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend Build & Lint
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # --- Stage 2: Question 2: Does it behave as intended? ---
  behavior:
    name: "Q2: Logical Behavior (Tests)"
    needs: correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Backend Tooling (uv)
        uses: astral-sh/setup-uv@v5

      - name: Backend Tests (Unit & Contract)
        working-directory: ./backend
        run: |
          uv run pytest tests/unit tests/contract --junitxml=results-unit.xml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend Tests (Vitest)
        working-directory: ./frontend
        run: |
          pnpm install
          pnpm run test:unit

  # --- Stage 3: Question 3, 4 & 5: Security, Trust, and IaC ---
  security-and-trust:
    name: "Q3-5: Security, Trust & IaC"
    needs: behavior
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Backend SAST (Bandit)
        working-directory: ./backend
        run: uv run bandit -r app/ -ll

      - name: API Contract Audit
        run: |
          if grep -q ":path}" frontend/src/lib/api/openapi.json; then
            echo "ERROR: Path traversal vulnerability surface detected in openapi.json!"
            exit 1
          fi

      - name: Supply Chain Check (uv lock)
        working-directory: ./backend
        run: uv lock --check

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: dockerfile,docker_compose
          check: HIGH,CRITICAL
          soft_fail: false

      - name: Config Validation (Prompt Registry)
        run: python3 -c "import yaml; yaml.safe_load(open('backend/app/core/prompts.yaml'))"

      - name: Artifact Verification (Docker Build)
        run: docker build -t karag:test -f backend/Dockerfile .

