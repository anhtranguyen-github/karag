name: Production DevSecOps Pipeline
# Expertise: Senior DevOps & Frontend Platform Engineer
# Architecture: Correctness -> Behavior -> Security -> Deployment

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # --- Stage 1: Backend Baseline ---
  backend-ci:
    name: "Backend: Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Backend Tooling (uv)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint, Format & Test
        working-directory: ./backend
        run: |
          uv sync
          uv run ruff check .
          uv run pytest tests/unit --junitxml=results-unit.xml

  # --- Stage 2: Frontend & Quality Gate ---
  frontend-ci:
    name: "Frontend: Build & Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # --- Stage 3: Multi-Domain Security ---
  security-audit:
    name: "Security: SAST, IaC & Deep Scan"
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Checkov Compliance Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          # Scanning Source, Docker, GHA, K8s, and Compose
          framework: dockerfile,github_actions,kubernetes,docker_compose,secrets
          check: HIGH,CRITICAL
          soft_fail: false

      - name: Docker Image Verification
        run: |
          docker build -t karag-backend:test -f backend/Dockerfile .
          docker build -t karag-frontend:test -f frontend/Dockerfile .

  # --- Stage 4: Production Deployment ---
  deploy-vercel:
    name: "Deploy: Vercel"
    needs: [security-audit]
    # Deploy on pushes to main or dev
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vercel Deploy
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./frontend

