name: DevSecOps Pipeline
# Conceptual Model: Correctness -> Behavior -> Security/Trust/IaC

on:
  push:
    branches: [ main, dev, 'Sc-dev/**' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # --- Domain 1: Backend Pipeline ---
  backend-pipeline:
    name: "Backend: Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Backend Tooling (uv)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint & Format
        working-directory: ./backend
        run: |
          uv sync
          uvx ruff check .
          uvx ruff format --check .
      - name: Unit & Contract Tests
        working-directory: ./backend
        run: uv run pytest tests/unit tests/contract --junitxml=results-unit.xml

  # --- Domain 2: Frontend Pipeline ---
  frontend-pipeline:
    name: "Frontend: Lint, Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Frontend Tooling (pnpm)
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install & Lint
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
      - name: Unit Tests (Vitest)
        working-directory: ./frontend
        run: pnpm run test:unit
      - name: Production Build
        working-directory: ./frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

  # --- Stage 3: Integration & Security (The "Gatekeeper") ---
  integration-and-security:
    name: "Integration, Security & Artifact Verification"
    needs: [backend-pipeline, frontend-pipeline]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Backend SAST (Bandit)
        working-directory: ./backend
        run: uv run bandit -r app/ -ll

      - name: API Contract Audit
        run: |
          if grep -q ":path}" frontend/src/lib/api/openapi.json; then
            echo "ERROR: Path traversal vulnerability surface detected in openapi.json!"
            exit 1
          fi

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: dockerfile,docker_compose
          check: HIGH,CRITICAL
          soft_fail: false

      - name: Config Validation
        run: python3 -c "import yaml; yaml.safe_load(open('backend/app/core/prompts.yaml'))"

      - name: Docker Artifact Verification
        run: |
          docker build -t karag-backend:test -f backend/Dockerfile .
          docker build -t karag-frontend:test -f frontend/Dockerfile .

