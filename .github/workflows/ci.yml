name: ci

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        working-directory: src/backend
        run: uv sync --quiet
      - name: Lint backend
        working-directory: src/backend
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test backend
        working-directory: src/backend
        run: uv run pytest ../../tests/unit/backend ../../tests/integration/contracts/test_backend_api_contracts.py ../../tests/integration/contracts/test_backend_llm_contracts.py --ignore=../../tests/unit/backend/core/test_path_security.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile
      - name: Generate frontend SDK
        working-directory: src/frontend
        run: pnpm run generate:api
      - name: Lint frontend
        working-directory: src/frontend
        run: |
          pnpm run lint
          pnpm run typecheck
      - name: Test frontend
        working-directory: src/frontend
        run: pnpm run test
      - name: Build frontend
        working-directory: src/frontend
        run: pnpm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
