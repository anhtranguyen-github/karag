name: Contract Validation & Integration Tests
# Expertise: API Contract Testing & CI/CD Pipeline Engineering
# Purpose: Validate API contract between backend and frontend, run integration tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'openapi/**'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'openapi/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # --- Stage 1: Export OpenAPI Schema ---
  export-schema:
    name: Export OpenAPI Schema
    runs-on: ubuntu-latest
    outputs:
      schema-hash: ${{ steps.schema-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: ./backend
        run: uv sync

      - name: Export OpenAPI Schema
        run: |
          cd ${{ github.workspace }}
          uv run python backend/scripts/export_openapi.py

      - name: Validate Schema
        run: |
          # Check if schema is valid JSON
          python3 -c "import json; json.load(open('openapi/schema.json'))"
          echo "✓ OpenAPI schema is valid JSON"
          
          # Check schema size
          SCHEMA_SIZE=$(stat -c%s openapi/schema.json)
          echo "Schema size: ${SCHEMA_SIZE} bytes"
          
          # Verify schema has paths
          PATHS_COUNT=$(python3 -c "import json; d=json.load(open('openapi/schema.json')); print(len(d.get('paths', {})))")
          echo "API endpoints: ${PATHS_COUNT}"
          
          if [ "$PATHS_COUNT" -eq 0 ]; then
            echo "✗ No API paths found in schema!"
            exit 1
          fi

      - name: Compute Schema Hash
        id: schema-hash
        run: |
          HASH=$(sha256sum openapi/schema.json | cut -d' ' -f1)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          echo "Schema hash: ${HASH}"

      - name: Upload Schema Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi/schema.json
          retention-days: 7

  # --- Stage 2: Validate Schema Changes ---
  validate-contract:
    name: Validate API Contract
    needs: export-schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Schema Artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: openapi

      - name: Check Schema Changes
        run: |
          if [ -f openapi/schema.json ]; then
            # For PRs, compare with base branch
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              git fetch origin ${{ github.base_ref }}
              
              # Check if schema exists in base
              if git show origin/${{ github.base_ref }}:openapi/schema.json > /dev/null 2>&1; then
                git show origin/${{ github.base_ref }}:openapi/schema.json > /tmp/base-schema.json
                
                if ! diff -q /tmp/base-schema.json openapi/schema.json > /dev/null 2>&1; then
                  echo "⚠ API schema has changed!"
                  echo "Changes detected:"
                  diff /tmp/base-schema.json openapi/schema.json || true
                  
                  # Check for breaking changes (simplified)
                  echo "Please ensure frontend SDK is regenerated."
                else
                  echo "✓ No API schema changes detected"
                fi
              else
                echo "✓ New schema file (no base to compare)"
              fi
            else
              echo "✓ Schema validated on push"
            fi
          fi

  # --- Stage 3: Generate Frontend SDK ---
  generate-sdk:
    name: Generate Frontend SDK
    needs: [export-schema, validate-contract]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download Schema Artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: openapi

      - name: Install Dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Generate SDK
        working-directory: ./frontend
        run: pnpm generate:api

      - name: Verify SDK Generation
        working-directory: ./frontend
        run: |
          if [ ! -d "src/client" ]; then
            echo "✗ SDK generation failed - no output directory"
            exit 1
          fi
          
          FILE_COUNT=$(find src/client -type f | wc -l)
          echo "Generated files: ${FILE_COUNT}"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "✗ No files generated!"
            exit 1
          fi
          
          echo "✓ SDK generated successfully"

      - name: Type Check SDK
        working-directory: ./frontend
        run: pnpm typecheck
        continue-on-error: false

      - name: Upload SDK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-sdk
          path: frontend/src/client/
          retention-days: 1

  # --- Stage 4: Contract Tests ---
  contract-tests:
    name: API Contract Tests
    needs: [export-schema, generate-sdk]
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: ./backend
        run: uv sync

      - name: Download Schema Artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: openapi

      - name: Start Backend
        working-directory: ./backend
        env:
          MONGODB_URL: mongodb://localhost:27017/karag_test
          QDRANT_URL: http://localhost:6333
          JWT_SECRET_KEY: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test-key
        run: |
          # Start backend in background
          uv run python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info &
          
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Verify health endpoint
          curl -s http://localhost:8000/health | jq .

      - name: Run Contract Tests
        working-directory: ./backend
        run: |
          # Test that exported schema matches running API
          curl -s http://localhost:8000/openapi.json > /tmp/running-schema.json
          
          # Compare key parts (paths may differ slightly due to ordering)
          python3 << 'EOF'
          import json
          
          with open('/tmp/running-schema.json') as f:
              running = json.load(f)
          with open('${{ github.workspace }}/openapi/schema.json') as f:
              exported = json.load(f)
          
          # Compare paths
          running_paths = set(running.get('paths', {}).keys())
          exported_paths = set(exported.get('paths', {}).keys())
          
          if running_paths != exported_paths:
              print("✗ Path mismatch!")
              print(f"Only in running: {running_paths - exported_paths}")
              print(f"Only in exported: {exported_paths - running_paths}")
              exit(1)
          
          print(f"✓ All {len(running_paths)} paths match")
          print("✓ Contract tests passed")
          EOF

      - name: Test API Endpoints
        run: |
          # Test health endpoint
          curl -sf http://localhost:8000/health || exit 1
          
          # Test OpenAPI endpoint
          curl -sf http://localhost:8000/openapi.json | jq '.openapi' || exit 1
          
          echo "✓ API endpoints are accessible"

  # --- Stage 5: Integration Tests ---
  integration-tests:
    name: Frontend Integration Tests
    needs: [generate-sdk, contract-tests]
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: ./backend
        run: uv sync

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Download SDK Artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-sdk
          path: frontend/src/client

      - name: Start Backend
        working-directory: ./backend
        env:
          MONGODB_URL: mongodb://localhost:27017/karag_test
          QDRANT_URL: http://localhost:6333
          JWT_SECRET_KEY: test-secret-key-for-ci-integration-tests
          OPENAI_API_KEY: sk-test-key
        run: |
          uv run python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info &
          
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run Integration Tests
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          # Run integration tests with generated SDK
          pnpm test:integration

  # --- Stage 6: Build Verification ---
  build-verification:
    name: Frontend Build Verification
    needs: [generate-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Download SDK Artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-sdk
          path: frontend/src/client

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          # Build with generated SDK
          pnpm build
          
          echo "✓ Frontend build successful with generated SDK"

  # --- Stage 7: Contract Drift Detection ---
  contract-drift:
    name: Contract Drift Detection
    needs: [export-schema]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Schema Artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: openapi-new

      - name: Detect Breaking Changes
        run: |
          git fetch origin ${{ github.base_ref }}
          
          if git show origin/${{ github.base_ref }}:openapi/schema.json > /dev/null 2>&1; then
            git show origin/${{ github.base_ref }}:openapi/schema.json > /tmp/base-schema.json
            
            # Simple breaking change detection
            python3 << 'EOF'
          import json
          import sys
          
          with open('/tmp/base-schema.json') as f:
              base = json.load(f)
          with open('openapi-new/schema.json') as f:
              new = json.load(f)
          
          base_paths = set(base.get('paths', {}).keys())
          new_paths = set(new.get('paths', {}).keys())
          
          removed_paths = base_paths - new_paths
          
          if removed_paths:
              print("⚠ BREAKING CHANGES DETECTED!")
              print(f"Removed endpoints: {removed_paths}")
              print("\nThis PR removes API endpoints that may be used by the frontend.")
              print("Please ensure this is intentional and coordinate with the frontend team.")
              # Don't fail, just warn
              sys.exit(0)
          else:
              print("✓ No breaking changes detected (no removed endpoints)")
          EOF
          else
            echo "✓ No base schema to compare (new file)"
          fi
