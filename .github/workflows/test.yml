name: test

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml
      - name: Backend schema export
        working-directory: src/backend
        run: |
          uv sync --quiet
          uv run python scripts/export_openapi.py
      - name: Frontend SDK generation
        working-directory: src/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run generate:api
      - name: Python contract tests
        working-directory: src/backend
        run: uv run pytest ../../tests/integration/contracts/test_backend_api_contracts.py ../../tests/integration/contracts/test_backend_llm_contracts.py
      - name: Frontend contract tests
        working-directory: src/frontend
        run: pnpm run test:contract
