[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
testpaths =
    tests/unit/backend
    tests/integration/backend
    tests/e2e/backend
pythonpath = .
markers =
    unit: pure and narrow backend tests
    integration: backend integration tests
    contract: schema and contract validation tests
    canary: non-blocking provider smoke tests
    e2e: end-to-end backend workflow tests
    slow: slow-running tests
addopts =
    -v
    --tb=short
    --strict-markers
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3\.13:DeprecationWarning
