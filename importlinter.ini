[importlinter]
# Import Linter Configuration
# Enforces architecture boundaries in the codebase

# Define the top-level packages/layers
# Based on the project structure:
# - api: FastAPI routes and endpoints
# - core: Core business logic, config, exceptions
# - services: Service layer for business operations
# - rag: RAG pipeline components
# - graph: LangGraph components
# - schemas: Pydantic models
# - providers: LLM/embedding provider abstractions
# - eval: Evaluation framework

[importlinter.workflow "api-layer"]
name = "API Layer Dependencies"
layers = [
    "api",
    "services",
    "core",
    "rag",
    "graph",
    "providers",
    "schemas",
    "eval",
]

# Contract 1: API should only depend on services, core, schemas
[importlinter.contract.api-dependencies]
name = "API dependencies"
fromlayer = "api"
tolayer = "services"
ignore = [
    "api.deps",
    "api.errors",
    "api.pagination",
    "api.versioning",
    "api.baas_deps",
]

[importlinter.contract.api-core-dependencies]
name = "API to core dependencies"
fromlayer = "api"
tolayer = "core"

[importlinter.contract.api-schemas-dependencies]
name = "API to schemas dependencies"
fromlayer = "api"
tolayer = "schemas"

# Contract 2: Services can depend on core, schemas, providers, rag, graph
[importlinter.contract.services-dependencies]
name = "Services layer dependencies"
fromlayer = "services"
tolayer = "core"

[importlinter.contract.services-providers]
name = "Services can use providers"
fromlayer = "services"
tolayer = "providers"

[importlinter.contract.services-rag]
name = "Services can use RAG"
fromlayer = "services"
tolayer = "rag"

# Contract 3: RAG and Graph should not depend on API
[importlinter.contract.rag-isolation]
name = "RAG should not depend on API"
fromlayer = "rag"
tolayer = "api"
is_strict = true

[importlinter.contract.graph-isolation]
name = "Graph should not depend on API"
fromlayer = "graph"
tolayer = "api"
is_strict = true

# Contract 4: Core should not depend on higher layers
[importlinter.contract.core-isolation]
name = "Core should not depend on API"
fromlayer = "core"
tolayer = "api"
is_strict = true

[importlinter.contract.core-services-isolation]
name = "Core should not depend on services"
fromlayer = "core"
tolayer = "services"
is_strict = true

# Contract 5: Providers are foundational - nothing should depend on them except services/core
[importlinter.contract.providers-isolation]
name = "Providers are foundational layer"
fromlayer = "api"
tolayer = "providers"
