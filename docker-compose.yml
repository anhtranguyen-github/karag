services:
  backend:
    build:
      context: ./src/backend
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app
      - backend_venv:/app/.venv
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - otel-collector
    profiles: ["cpu"]

  frontend:
    build:
      context: ./src/frontend
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8088
      PLATFORM_API_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    profiles: ["cpu"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: karag
      POSTGRES_USER: karag
      POSTGRES_PASSWORD: karag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles: ["cpu"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["cpu"]

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: ["cpu"]

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    profiles: ["cpu"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    profiles: ["cpu"]

  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8001:8001"
      - "8088:8000"
    volumes:
      - ./deploy/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - backend
      - frontend
    profiles: ["cpu"]

  temporal:
    image: temporalio/auto-setup:1.26.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: karag
      POSTGRES_PWD: karag
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./deploy/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    depends_on:
      - postgres
    profiles: ["cpu"]

  ollama:
    image: ollama/ollama:0.6.5
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["cpu"]

  vllm:
    image: vllm/vllm-openai:latest
    command: --model meta-llama/Llama-3.1-8B-Instruct
    ports:
      - "8008:8000"
    profiles: ["gpu"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["cpu"]

  prometheus:
    image: prom/prometheus:v3.2.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: ["cpu"]

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/otel/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4319:4317"
    profiles: ["cpu"]

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    profiles: ["cpu"]

  grafana:
    image: grafana/grafana-oss:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    profiles: ["cpu"]

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  ollama_data:
  backend_venv:
  frontend_node_modules:
