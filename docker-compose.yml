networks:
  ai_architect_network:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped
    networks:
      - ai_architect_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:latest
    container_name: ai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db:z
    restart: unless-stopped
    networks:
      - ai_architect_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: ai-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data:z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - ai_architect_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama:z
    restart: unless-stopped
    networks:
      - ai_architect_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  vllm:
    image: vllm/vllm-openai:latest
    container_name: ai-vllm
    ports:
      - "8008:8000"
    volumes:
      - ./model_cache:/root/.cache/huggingface:z
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - ai_architect_network
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct} --max-model-len 4096 --disable-log-requests --enforce-eager
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ai-llamacpp
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:z
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - ai_architect_network
    command: >
      -m /models/${LLAMACPP_MODEL:-qwen2.5-0.5b-instruct.gguf} --host 0.0.0.0 --port 8080 -c 4096 --embedding -ngl 99
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai_architect_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-backend
    environment:
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=backend
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      - METRICS_ENABLED=true
    depends_on:
      - mongodb
      - qdrant
      - minio
      - jaeger
    networks:
      - ai_architect_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-frontend
    depends_on:
      - backend
    networks:
      - ai_architect_network

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_architect_network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - ai_architect_network

  neo4j:
    image: neo4j:latest
    container_name: ai-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - ./neo4j_data:/data:z
      - ./neo4j_logs:/logs:z
    environment:
      - NEO4J_AUTH=neo4j/neo4j_password
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
    networks:
      - ai_architect_network
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_password", "RETURN 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
