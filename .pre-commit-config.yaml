# Pre-commit hooks for architecture enforcement
# Install with: pre-commit install

repos:
  # =============================================================================
  # Python Checks
  # =============================================================================
  
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # =============================================================================
  # Architecture Drift Detection
  # =============================================================================
  
  - repo: local
    hooks:
      - id: architecture-drift
        name: Architecture Drift Detection
        entry: python scripts/drift_detector.py --strict
        language: system
        pass_filenames: false
        stages: [pre-commit]
        description: Check for domain boundary violations

  # =============================================================================
  # TypeScript/JavaScript Checks  
  # =============================================================================
  
  - repo: https://github.com/prettier/prettier
    rev: 3.2.4
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|md|yaml|yml)$
        stages: [pre-commit]

  # =============================================================================
  # Secret Scanning
  # =============================================================================
  
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: main
    hooks:
      - id: trufflehog
        args: [--only-verified]
        stages: [commit-msg]
