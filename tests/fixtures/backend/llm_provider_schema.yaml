llm_request:
  type: object
  required:
    - messages
  properties:
    messages:
      type: array
      items:
        type: object
        required:
          - role
          - content
        properties:
          role:
            type: string
            enum: [system, user, assistant]
          content:
            type: string
    temperature:
      type: number
    max_tokens:
      type: integer

llm_response:
  type: object
  required:
    - content
    - model
    - provider
  properties:
    content:
      type: string
    model:
      type: string
    provider:
      type: string
    usage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
    metadata:
      type: object
