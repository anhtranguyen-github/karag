apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-platform-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: rag-platform-frontend
  template:
    metadata:
      labels:
        app: rag-platform-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
