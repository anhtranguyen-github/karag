apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-platform-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: rag-platform-backend
  template:
    metadata:
      labels:
        app: rag-platform-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: {{ .Values.backend.service.port }}
